[DEFAULT]
# === CORE CONFIGURATION ===
# Bitcoin destination address for sweeping found funds
DESTINATION_ADDRESS = bc1qxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Network selection (bitcoin, ethereum, polygon, arbitrum, optimism)
NETWORK = bitcoin

# Minimum balance threshold in satoshis (default: 1000 satoshis = 0.00001 BTC)
MINIMUM_BALANCE_SATS = 1000

# === PROVIDER CONFIGURATION ===
# Provider selection (comma-separated)
# Available: blockcypher,blockstream,alchemy,infura,dummy
PROVIDERS = blockcypher,blockstream,dummy

# API keys for various providers (insert your own for higher rate limits)
BLOCKCYPHER_TOKEN =
BLOCKSTREAM_API_KEY =
ALCHEMY_API_KEY =
INFURA_PROJECT_ID =
INFURA_PROJECT_SECRET =

# === PERFORMANCE TUNING ===
# Number of worker processes (default: CPU count)
MAX_WORKERS = 

# Size of work chunks claimed from state file
CHUNK_SIZE = 1000000

# Batch size for address balance checking
BATCH_SIZE = 100

# Request timeout in seconds
REQUEST_TIMEOUT = 30

# Entropy bits (128 for standard BIP39)
ENTROPY_BITS = 128

# === MONITORING & LOGGING ===
# Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
LOG_LEVEL = INFO

# Enable real-time monitoring system
ENABLE_MONITORING = true

# Monitoring update interval in seconds
MONITORING_INTERVAL = 30

# Metrics save interval in seconds
SAVE_METRICS_INTERVAL = 300

# System health check interval in seconds
HEALTH_CHECK_INTERVAL = 60

# === ADVANCED OPTIONS ===
# Enable adaptive batch sizing based on performance
ADAPTIVE_BATCH_SIZING = true

# Maximum batch size when adaptive sizing is enabled
MAX_BATCH_SIZE = 500

# Enable circuit breaker pattern for providers
ENABLE_CIRCUIT_BREAKER = true

# Failure threshold for circuit breaker
CIRCUIT_FAILURE_THRESHOLD = 5

# Circuit breaker timeout in seconds
CIRCUIT_TIMEOUT = 60
